# ==============================================================================
# OmniGrasp CI Pipeline
# ==============================================================================
# This workflow runs automatically on every push and pull request.
# It checks code quality, builds the ROS2 workspace, and runs tests.
#
# WHY THIS MATTERS:
# When Gio looks at your repo, the first thing he sees is the green badge.
# It tells him: "This person writes tested, verified code — not scripts
# that work on their laptop and nowhere else."
# ==============================================================================

# 'name' is what appears in the GitHub Actions tab
name: OmniGrasp CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    container:
      image: ros:humble-ros-base

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ================================================================
      # CACHE: Save pip packages between runs so we don't re-download
      # PyTorch (2GB) every single time. First run is slow, but every
      # run after that reuses the cache and takes ~1-2 minutes instead
      # of 1+ hour.
      # ================================================================
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/python3.10/dist-packages
          key: pip-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            python3-pip \
            python3-colcon-common-extensions \
            ros-humble-cv-bridge \
            ros-humble-vision-msgs \
            ros-humble-rosbridge-suite > /dev/null 2>&1
          pip3 install --no-cache-dir \
            flake8 \
            black \
            pytest \
            numpy \
            scipy \
            filterpy \
            opencv-python-headless

      - name: Lint with flake8
        run: |
          python3 -m flake8 src/ --max-line-length=100 --exclude=__pycache__,*.egg-info --extend-ignore=E203

      - name: Check formatting with black
        run: |
          python3 -m black --check --line-length=100 src/

      - name: Build ROS2 workspace
        run: |
          source /opt/ros/humble/setup.bash
          cd $GITHUB_WORKSPACE
          colcon build --symlink-install
        shell: bash

      - name: Run tests
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test
          colcon test-result --verbose
        shell: bash